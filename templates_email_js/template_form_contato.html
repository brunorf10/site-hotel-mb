<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #222222; margin: 0; padding: 0; background-color: #FDFCFB; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border: 1px solid #eeeeee; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { background-color: #5c3216; color: #ffffff; padding: 30px 20px; text-align: center; }
        .header h1 { margin: 0; font-family: 'Times New Roman', serif; letter-spacing: 2px; text-transform: uppercase; font-size: 20px; }
        .content { padding: 30px; }
        .section-title { color: #BFA15A; font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; margin-bottom: 15px; }
        .data-row { margin-bottom: 10px; border-bottom: 1px solid #fafafa; padding-bottom: 8px; }
        .label { font-weight: bold; color: #666666; font-size: 11px; text-transform: uppercase; }
        .value { font-size: 14px; margin-top: 2px; }
        .message-box { background: #f9f9f9; padding: 20px; border-left: 4px solid #BFA15A; border-radius: 4px; font-size: 15px; white-space: pre-line; margin-top: 20px; }
        .footer { background-color: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #999999; }
        .btn { display: inline-block; padding: 12px 25px; background-color: #bfa15a; color: #ffffff; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Hotel Maria Bastos</h1>
            <p style="margin-top: 5px; opacity: 0.8; font-size: 14px;">Nova Mensagem de Contato</p>
        </div>
        <div class="content">
            <div class="section-title">Informações de Contato</div>
            <div class="data-row"><div class="label">De:</div><div class="value">{{from_name}}</div></div>
            <div class="data-row"><div class="label">E-mail:</div><div class="value">{{from_email}}</div></div>
            <div class="data-row"><div class="label">Telefone:</div><div class="value">{{phone}}</div></div>
            <div class="data-row"><div class="label">Assunto:</div><div class="value"><strong>{{contact_subject}}</strong></div></div>
            <div class="section-title" style="margin-top: 30px;">Mensagem</div>
            <div class="message-box">
                {{message}}
            </div>
            <div style="text-align: center">
                <a href="mailto:{{from_email}}" class="btn">Responder por E-mail</a>
            </div>
        </div>
        <div class="footer">
            Enviado via formulário de contato do site Hotel Maria Bastos.
        </div>
    </div>
</body>
</html>
